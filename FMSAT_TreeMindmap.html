<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FMSAT 知识图谱 - 树状思维导图</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 1600px; margin: 0 auto; }
        .card {
            background: white; border-radius: 15px; padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); margin-bottom: 20px;
        }
        h1 { color: #1a1a2e; margin-bottom: 20px; text-align: center; }
        .mindmap-wrapper {
            width: 100%; overflow-x: auto; border: 2px solid #00d4ff;
            border-radius: 10px; background: #fafafa; padding: 30px;
        }
        .controls { display: flex; gap: 10px; margin-top: 15px; justify-content: center; }
        button {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            color: white; border: none; padding: 12px 25px; border-radius: 25px;
            cursor: pointer; font-size: 14px; font-weight: bold;
        }
        button:hover { transform: scale(1.05); }
        
        /* 思维导图 SVG 样式 */
        .mindmap-node { cursor: pointer; transition: all 0.3s; }
        .mindmap-node:hover { filter: brightness(1.1); }
        .mindmap-node rect { rx: 8; ry: 8; filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.2)); }
        .mindmap-node text { font-weight: bold; pointer-events: none; }
        .mindmap-link { fill: none; stroke: #999; stroke-width: 2; }
        
        .legend { display: flex; gap: 15px; margin-top: 15px; justify-content: center; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .legend-color { width: 30px; height: 20px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🧠 FMSAT 知识图谱 - 树状思维导图</h1>
            
            <div class="mindmap-wrapper">
                <svg id="mindmap" width="1400" height="900" viewBox="0 0 1400 900">
                    <defs>
                        <!-- 渐变色定义 -->
                        <linearGradient id="grad-root" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
                        </linearGradient>
                        <linearGradient id="grad-challenge" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
                        </linearGradient>
                        <linearGradient id="grad-arch" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
                        </linearGradient>
                        <linearGradient id="grad-contrib" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#43e97b;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#38f9d7;stop-opacity:1" />
                        </linearGradient>
                        <linearGradient id="grad-ai" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#fa709a;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#fee140;stop-opacity:1" />
                        </linearGradient>
                        <linearGradient id="grad-tech" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#a8edea;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#fed6e3;stop-opacity:1" />
                        </linearGradient>
                        <linearGradient id="grad-perf" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ff9a9e;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#fecfef;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    
                    <!-- 连接线 -->
                    <g id="links"></g>
                    
                    <!-- 节点 -->
                    <g id="nodes"></g>
                </svg>
            </div>
            
            <div class="controls">
                <button onclick="zoomIn()">🔍 放大</button>
                <button onclick="zoomOut()">🔎 缩小</button>
                <button onclick="resetView()">🎯 重置视图</button>
                <button onclick="toggleAll()">🔄 展开/折叠全部</button>
            </div>
            
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);"></div>
                    <span>🚀 FMSAT 知识图谱</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);"></div>
                    <span>🎯 研究挑战</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);"></div>
                    <span>🏗️ 系统架构</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);"></div>
                    <span>💡 核心贡献</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);"></div>
                    <span>🤖 AI 模型</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);"></div>
                    <span>🔬 关键技术</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);"></div>
                    <span>📊 性能指标</span>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 思维导图数据
        const mindmapData = {
            id: "root", label: "🚀 FMSAT\n知识图谱", x: 700, y: 50, width: 140, height: 60, gradient: "url(#grad-root)",
            children: [
                {
                    id: "c1", label: "🎯 研究挑战", x: 150, y: 180, width: 120, height: 50, gradient: "url(#grad-challenge)",
                    children: [
                        { id: "c1-1", label: "雨衰和大气衰减\n卫星信道受降雨影响", x: 50, y: 300, width: 130, height: 50, gradient: "url(#grad-challenge)" },
                        { id: "c1-2", label: "长传播延迟\n2-20ms 影响 HARQ", x: 200, y: 300, width: 130, height: 50, gradient: "url(#grad-challenge)" },
                        { id: "c1-3", label: "同信道干扰 (CCI)\n频率复用导致干扰", x: 350, y: 300, width: 130, height: 50, gradient: "url(#grad-challenge)" }
                    ]
                },
                {
                    id: "c2", label: "🏗️ 系统架构", x: 400, y: 180, width: 120, height: 50, gradient: "url(#grad-arch)",
                    children: [
                        { id: "c2-1", label: "用户终端 UT\n发送端设备", x: 320, y: 300, width: 110, height: 50, gradient: "url(#grad-arch)" },
                        { id: "c2-2", label: "再生卫星\nLEO 星上处理", x: 450, y: 300, width: 110, height: 50, gradient: "url(#grad-arch)" },
                        { id: "c2-3", label: "网关\n地面站语义重建", x: 580, y: 300, width: 110, height: 50, gradient: "url(#grad-arch)" }
                    ]
                },
                {
                    id: "c3", label: "💡 核心贡献", x: 650, y: 180, width: 120, height: 50, gradient: "url(#grad-contrib)",
                    children: [
                        { id: "c3-1", label: "FMSAT 框架\nFM 基分割重建", x: 570, y: 300, width: 110, height: 50, gradient: "url(#grad-contrib)" },
                        { id: "c3-2", label: "自适应编解码器\n多速率信道自适应", x: 700, y: 300, width: 110, height: 50, gradient: "url(#grad-contrib)" },
                        { id: "c3-3", label: "双层错误检测\n粗略 + 精细检测器", x: 830, y: 300, width: 110, height: 50, gradient: "url(#grad-contrib)" }
                    ]
                },
                {
                    id: "c4", label: "🤖 AI 模型", x: 900, y: 180, width: 120, height: 50, gradient: "url(#grad-ai)",
                    children: [
                        { id: "c4-1", label: "SegGPT\nmIoU≈80%", x: 820, y: 300, width: 110, height: 50, gradient: "url(#grad-ai)" },
                        { id: "c4-2", label: "UNet\nmIoU≈60% 轻量级", x: 950, y: 300, width: 110, height: 50, gradient: "url(#grad-ai)" },
                        { id: "c4-3", label: "条件扩散模型\n图像去噪修复", x: 1080, y: 300, width: 110, height: 50, gradient: "url(#grad-ai)" }
                    ]
                },
                {
                    id: "c5", label: "🔬 关键技术", x: 1150, y: 180, width: 120, height: 50, gradient: "url(#grad-tech)",
                    children: [
                        { id: "c5-1", label: "语义通信\n共享知识库", x: 1050, y: 300, width: 100, height: 50, gradient: "url(#grad-tech)" },
                        { id: "c5-2", label: "OFDM\n正交频分复用", x: 1170, y: 300, width: 100, height: 50, gradient: "url(#grad-tech)" },
                        { id: "c5-3", label: "HARQ\n混合自动重传", x: 1290, y: 300, width: 100, height: 50, gradient: "url(#grad-tech)" }
                    ]
                },
                {
                    id: "c6", label: "📊 性能指标", x: 250, y: 450, width: 120, height: 50, gradient: "url(#grad-perf)",
                    children: [
                        { id: "c6-1", label: "分割性能\nSegGPT:80% UNet:60%", x: 100, y: 570, width: 130, height: 50, gradient: "url(#grad-perf)" },
                        { id: "c6-2", label: "错误检测阈值\nMSE_req≤0.015", x: 250, y: 570, width: 130, height: 50, gradient: "url(#grad-perf)" },
                        { id: "c6-3", label: "带宽需求\n显著降低", x: 400, y: 570, width: 130, height: 50, gradient: "url(#grad-perf)" }
                    ]
                }
            ]
        };
        
        let scale = 1;
        let expanded = true;
        
        // 绘制贝塞尔曲线连接
        function drawLink(x1, y1, x2, y2) {
            const midY = (y1 + y2) / 2;
            return `<path class="mindmap-link" d="M${x1},${y1} C${x1},${midY} ${x2},${midY} ${x2},${y2}" />`;
        }
        
        // 绘制节点
        function drawNode(node) {
            const lines = node.label.split('\n');
            const textY = node.y - lines.length * 8 + 5;
            
            let svg = `<g class="mindmap-node" data-id="${node.id}">`;
            svg += `<rect x="${node.x}" y="${node.y}" width="${node.width}" height="${node.height}" fill="${node.gradient}" />`;
            
            lines.forEach((line, i) => {
                svg += `<text x="${node.x + node.width/2}" y="${textY + i * 16}" text-anchor="middle" fill="white" font-size="12">${line}</text>`;
            });
            
            svg += `</g>`;
            return svg;
        }
        
        // 渲染思维导图
        function render() {
            const svg = document.getElementById('mindmap');
            let links = '';
            let nodes = '';
            
            // 渲染根节点
            nodes += drawNode(mindmapData);
            
            // 渲染一级分支和连接线
            if (expanded && mindmapData.children) {
                mindmapData.children.forEach(child => {
                    // 连接线：根到一级
                    links += drawLink(mindmapData.x + mindmapData.width/2, mindmapData.y + mindmapData.height, 
                                     child.x + child.width/2, child.y);
                    nodes += drawNode(child);
                    
                    // 渲染二级节点和连接线
                    if (child.children) {
                        child.children.forEach(sub => {
                            links += drawLink(child.x + child.width/2, child.y + child.height,
                                            sub.x + sub.width/2, sub.y);
                            nodes += drawNode(sub);
                        });
                    }
                });
            }
            
            document.getElementById('links').innerHTML = links;
            document.getElementById('nodes').innerHTML = nodes;
        }
        
        // 控制函数
        function zoomIn() {
            scale *= 1.2;
            document.getElementById('mindmap').style.transform = `scale(${scale})`;
        }
        
        function zoomOut() {
            scale /= 1.2;
            document.getElementById('mindmap').style.transform = `scale(${scale})`;
        }
        
        function resetView() {
            scale = 1;
            document.getElementById('mindmap').style.transform = 'scale(1)';
        }
        
        function toggleAll() {
            expanded = !expanded;
            render();
        }
        
        // 初始化
        render();
    </script>
</body>
</html>
